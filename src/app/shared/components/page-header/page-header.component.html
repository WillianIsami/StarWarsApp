<header class="sw-header">
  <div class="sw-header__inner sw-panel">
    <a class="sw-header__brand" routerLink="/characters">
      <span class="sw-header__brand-badge">SW</span>
      <div>
        <h1>Holonet Command</h1>
        <p>Star Wars Intelligence Dashboard</p>
      </div>
    </a>

    <div class="sw-header__status sw-chip">
      Setor ativo: {{ activeRouteLabel }}
    </div>

    <button
      type="button"
      class="sw-header__menu-button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen"
      aria-label="Abrir menu"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="sw-header__nav" [class.is-open]="menuOpen">
      @for (route of allRoutes; track route.path) {
        <a
          [routerLink]="route.path"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMenu()"
        >
          <span>{{ route.label }}</span>
          <small>{{ route.description }}</small>
        </a>
      }
    </nav>
  </div>
</header>
